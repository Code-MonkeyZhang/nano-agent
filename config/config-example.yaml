# Nano Agent Configuration
#
# Server-level settings. Agent and credential configurations are stored
# separately in the data/ directory.

# Enable file logging to project-root/logs/
enableLogging: false

# Retry configuration for LLM API calls
retry:
  enabled: true    # Enable retry mechanism
  maxRetries: 3    # Maximum number of retries on failure

# Tools Configuration
tools:
  # Directory containing skill files
  skillsDir: './skills'
  # Path to MCP server configuration file
  mcpConfigPath: 'mcp.json'
  # MCP timeout settings (in seconds)
  mcp:
    connectTimeout: 10.0    # Timeout for MCP server connection
    executeTimeout: 60.0    # Timeout for MCP tool execution
    sseReadTimeout: 120.0   # Timeout for SSE read operations
